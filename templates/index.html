<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DocuMind AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Courier New', monospace; background: #000000; color: #ffffff; height: 100vh; display: flex; flex-direction: column; }
  .app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
  .sidebar { background: #0a0a0a; border-right: 1px solid #1e1e1e; display: flex; flex-direction: column; }
  .logo-area { padding: 20px; border-bottom: 1px solid #1e1e1e; display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 42px; height: 42px; border-radius: 10px; background: none; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .logo-text { font-size: 16px; font-weight: 700; color: #ffffff; }
  .logo-sub { font-size: 10px; color: #888888; letter-spacing: 2px; text-transform: uppercase; }
  .upload-zone { margin: 16px; border: 2px dashed #2a2a2a; border-radius: 10px; padding: 24px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .upload-zone:hover, .upload-zone.dragover { border-color: #4f8ef7; background: #0a0f1a; }
  .upload-zone input { display: none; }
  .upload-zone p { font-size: 12px; color: #aaaaaa; margin-top: 8px; }
  .upload-zone span { font-size: 10px; color: #555555; }
  #upload-status { margin: 0 16px 12px; font-size: 11px; color: #3dd68c; display: none; padding: 8px 12px; background: #0a1a0f; border-radius: 8px; border: 1px solid #1a3525; }
  .doc-list { flex: 1; padding: 8px 12px; overflow-y: auto; }
  .doc-label { font-size: 9px; color: #555555; letter-spacing: 2px; text-transform: uppercase; padding: 4px; margin-bottom: 8px; }
  .doc-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 11px; color: #aaaaaa; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .doc-item.active { background: #111111; color: #ffffff; border: 1px solid #2a2a2a; }
  .main { display: flex; flex-direction: column; background: #050505; }
  .topbar { padding: 14px 24px; border-bottom: 1px solid #1e1e1e; display: flex; align-items: center; justify-content: space-between; }
  #doc-status { font-size: 11px; color: #888888; }
  #chat-box { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
  .msg { display: flex; gap: 12px; }
  .msg.user { flex-direction: row-reverse; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .avatar.ai { background: #0a1a3a; border: 1px solid #1a2a50; color: #4f8ef7; }
  .avatar.user { background: #111111; border: 1px solid #2a2a2a; color: #ffffff; }
  .bubble { max-width: 70%; }
  .ai .bubble-inner { background: #111111; border: 1px solid #1e1e1e; border-radius: 0 10px 10px 10px; color: #ffffff; padding: 12px 16px; font-size: 13px; line-height: 1.7; white-space: pre-wrap; }
  .user .bubble-inner { background: #0a1a3a; border: 1px solid #1a2a50; border-radius: 10px 0 10px 10px; color: #ffffff; padding: 12px 16px; font-size: 13px; line-height: 1.7; }
  .bubble-time { font-size: 9px; color: #555555; margin-top: 4px; }
  .msg.user .bubble-time { text-align: right; }
  .typing { display: flex; gap: 4px; align-items: center; padding: 12px 16px; background: #111111; border-radius: 0 10px 10px 10px; width: fit-content; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #4f8ef7; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0.7); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
  .input-area { padding: 16px 24px; border-top: 1px solid #1e1e1e; }
  .input-row { display: flex; gap: 10px; }
  #question { flex: 1; background: #111111; border: 1px solid #2a2a2a; border-radius: 10px; padding: 12px 16px; color: #ffffff; font-family: 'Courier New', monospace; font-size: 13px; resize: none; outline: none; transition: border-color 0.2s; }
  #question::placeholder { color: #555555; }
  #question:focus { border-color: #4f8ef7; }
  #send-btn { background: #4f8ef7; border: none; border-radius: 10px; padding: 0 20px; color: white; cursor: pointer; font-size: 16px; transition: background 0.15s; }
  #send-btn:hover { background: #3d7ae5; }
  #send-btn:disabled { background: #222222; cursor: default; }
  .hint { text-align: center; font-size: 9px; color: #333333; margin-top: 10px; letter-spacing: 1px; text-transform: uppercase; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="logo-area">
      <div class="logo-icon">
        <svg width="42" height="42" viewBox="0 0 120 120">
          <defs>
            <linearGradient id="gB" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#0f1117"/>
              <stop offset="100%" stop-color="#1a1f30"/>
            </linearGradient>
          </defs>
          <rect x="10" y="10" width="100" height="100" rx="22" fill="url(#gB)" stroke="#2a3060" stroke-width="1.5"/>
          <circle cx="60" cy="52" r="22" fill="none" stroke="#4f8ef7" stroke-width="2"/>
          <circle cx="60" cy="52" r="14" fill="none" stroke="#7c5fcf" stroke-width="1.5" stroke-dasharray="4 3"/>
          <circle cx="60" cy="52" r="5" fill="#4f8ef7"/>
          <line x1="60" y1="30" x2="60" y2="24" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round"/>
          <line x1="60" y1="74" x2="60" y2="80" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round"/>
          <line x1="38" y1="52" x2="32" y2="52" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round"/>
          <line x1="82" y1="52" x2="88" y2="52" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round"/>
          <rect x="30" y="82" width="60" height="6" rx="3" fill="#4f8ef7" opacity="0.3"/>
          <rect x="38" y="92" width="44" height="4" rx="2" fill="#7c5fcf" opacity="0.3"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">DocuMind AI</div>
        <div class="logo-sub">RAG · Groq · LLaMA</div>
      </div>
    </div>

    <div class="upload-zone" onclick="document.getElementById('file-input').click()" id="drop-zone">
      <div style="font-size:28px"></div>
      <p>Click or drop your PDF here</p>
      <span>Max 16MB · PDF only</span>
      <input type="file" id="file-input" accept=".pdf" onchange="uploadFile(this.files[0])">
    </div>
    <div id="upload-status"></div>
    <div class="doc-list">
      <div class="doc-label">Active Document</div>
      <div id="doc-name" class="doc-item">No document loaded</div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <span id="doc-status" style="font-size:11px;color:#888888;">Please upload a PDF to get started</span>
      <span style="font-size:9px;color:#444444;letter-spacing:1px;text-transform:uppercase;">RAG · Groq · LLaMA 3.3 70B</span>
    </div>
    <div id="chat-box"></div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="question" rows="2" placeholder="Ask anything about your document..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
        <button id="send-btn" onclick="sendMessage()">➤</button>
      </div>
      <div class="hint">Powered by Groq + LLaMA 3.3 70B + TF-IDF Vector Search</div>
    </div>
  </div>
</div>

<script>
let sessionId = null;

function addMsg(text, role) {
  const box = document.getElementById('chat-box');
  const time = new Date().toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'});
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="avatar ${role}">${role==='ai'?'AI':'U'}</div>
    <div class="bubble ${role}">
      <div class="bubble-inner">${text}</div>
      <div class="bubble-time">${time}</div>
    </div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function showTyping() {
  const box = document.getElementById('chat-box');
  const div = document.createElement('div');
  div.className = 'msg'; div.id = 'typing-indicator';
  div.innerHTML = `<div class="avatar ai">AI</div><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function uploadFile(file) {
  if (!file) return;
  const status = document.getElementById('upload-status');
  status.style.display = 'block';
  status.textContent = 'Uploading and processing...';
  const form = new FormData();
  form.append('pdf', file);
  try {
    const res = await fetch('/upload', {method:'POST', body: form});
    const data = await res.json();
    if (data.error) { status.textContent = '' + data.error; return; }
    sessionId = data.session_id;
    status.textContent = `${data.filename} — ${data.chunks} chunks indexed`;
    document.getElementById('doc-name').textContent = '' + data.filename;
    document.getElementById('doc-name').className = 'doc-item active';
    document.getElementById('doc-status').textContent = data.filename + ' · ' + data.chunks + ' chunks indexed';
    addMsg(`Document loaded successfully! Extracted ${data.chunks} chunks from "${data.filename}". You can now ask me anything about it.`, 'ai');
  } catch(e) { status.textContent = 'Upload failed. Please try again.'; }
}

async function sendMessage() {
  const q = document.getElementById('question').value.trim();
  if (!q || !sessionId) {
    if (!sessionId) addMsg('Please upload a PDF document first!', 'ai');
    return;
  }
  addMsg(q, 'user');
  document.getElementById('question').value = '';
  document.getElementById('send-btn').disabled = true;
  showTyping();
  try {
    const res = await fetch('/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({session_id: sessionId, question: q})});
    const data = await res.json();
    removeTyping();
    addMsg(data.answer || data.error, 'ai');
  } catch(e) { removeTyping(); addMsg('No response from server. Please try again.', 'ai'); }
  document.getElementById('send-btn').disabled = false;
}

const zone = document.getElementById('drop-zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('dragover'); uploadFile(e.dataTransfer.files[0]); });

addMsg('Hello! I am DocuMind AI. Upload a PDF document and ask me anything about its contents.', 'ai');
</script>
</body>
</html>
